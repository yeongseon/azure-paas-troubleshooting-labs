reproducibility: "100% — all 8 test cases produced identical results across 3 runs"

key_findings:
  - "Envoy routes HTTP requests by Host header, NOT by TLS SNI"
  - "SNI is required for TLS termination — no SNI = connection reset"
  - "SNI must match the environment wildcard — outside-env SNI = connection reset"
  - "Any SNI within the env wildcard succeeds TLS (even nonexistent apps)"
  - "Envoy returns 404 when Host header doesn't match any configured app"
  - "Cross-app routing via Host header mismatch is a real security concern in shared environments"
