site_name: Azure PaaS Troubleshooting Labs
site_description: Support-engineer-style troubleshooting experiments for Azure App Service, Azure Functions, and Azure Container Apps
site_author: Yeongseon Choe
repo_url: https://github.com/yeongseon/azure-paas-troubleshooting-labs
site_url: https://yeongseon.github.io/azure-paas-troubleshooting-labs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - toc.integrate

